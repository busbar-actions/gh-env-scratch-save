name: 'Busbar — gh-env-scratch-save'
description: 'Create or update a GitHub Environment and store scratch-org credentials from sf-org-create there.'
author: 'Busbar'

inputs:
  credentials-path:
    description: 'Path to the JSON file written by sf-org-create.'
    required: false
    default: '.busbar/scratch-credentials.json'
  environment-name:
    description: 'GitHub Environment name. Defaults to the stable named slot `scratch`.'
    required: false
    default: 'scratch'
  repository:
    description: 'Target repository in owner/repo form. Empty = current repository.'
    required: false
    default: ''
  # Authentication is EXCLUSIVELY via the Busbar GitHub App — this action never
  # uses GITHUB_TOKEN. The App mints a least-privilege, repo-pinned token
  # (environments:read + secrets:write).
  github-app-id:
    description: 'GitHub App id (REQUIRED). The App mints a least-privilege installation token for the target repo.'
    required: true
  github-app-private-key:
    description: 'GitHub App private key PEM (REQUIRED). Provide via a secret.'
    required: true
  version:
    description: 'Release tag of the gh-env-scratch-save binary.'
    required: false
    default: 'latest'
  binary-repo:
    description: 'GitHub repo hosting prebuilt binary releases.'
    required: false
    default: 'busbar-actions/actions-dist'

outputs:
  environment_name:
    description: 'The GitHub Environment name that was created/populated.'
    value: ${{ steps.save.outputs.environment_name }}
  repository:
    description: 'The repository that received the environment.'
    value: ${{ steps.save.outputs.repository }}
  scratch_org_id:
    description: 'The scratch org id persisted into the environment.'
    value: ${{ steps.save.outputs.scratch_org_id }}
  scratch_org_info_id:
    description: 'The ScratchOrgInfo id persisted into the environment.'
    value: ${{ steps.save.outputs.scratch_org_info_id }}

# The binary owns all logic and UX: it reads its inputs from INPUT_*, resolves
# the GitHub API token (token or App creds), creates/updates the environment,
# stores the scratch-org secrets, and writes GITHUB_OUTPUT, the step summary and
# an annotation. This action only installs it and passes inputs through.
runs:
  using: 'composite'
  steps:
    - name: Install the gh-env-scratch-save binary from actions-dist
      uses: busbar-actions/setup@main
      with:
        binary: gh-env-scratch-save
        version: ${{ inputs.version }}
        binary-repo: ${{ inputs.binary-repo }}

    - name: Store the sf-org-create scratch-org credentials into the "${{ inputs.environment-name }}" GitHub Environment via the Busbar GitHub App
      id: save
      shell: bash
      env:
        INPUT_CREDENTIALS_PATH: ${{ inputs.credentials-path }}
        INPUT_ENVIRONMENT_NAME: ${{ inputs.environment-name }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        # Authentication is EXCLUSIVELY via the Busbar GitHub App. GITHUB_TOKEN is
        # never passed or used — the App mints a least-privilege, repo-pinned token
        # (environments:read + secrets:write).
        INPUT_GITHUB_APP_ID: ${{ inputs.github-app-id }}
        INPUT_GITHUB_APP_PRIVATE_KEY: ${{ inputs.github-app-private-key }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        set -euo pipefail
        echo "▶ TESTING: store the scratch-org credentials from '${INPUT_CREDENTIALS_PATH}' into the '${INPUT_ENVIRONMENT_NAME}' GitHub Environment of repo '${INPUT_REPOSITORY:-$GITHUB_REPOSITORY}'"
        echo "  evidence — source credentials JSON the binary will read:"
        ls -la "${INPUT_CREDENTIALS_PATH}"
        # The binary owns the App-token mint, the create-or-update of the
        # environment, the secret writes (secrets:write), and
        # GITHUB_OUTPUT/summary/annotation. Any non-zero exit aborts the step.
        gh-env-scratch-save
        echo "✓ RESULT: environment='${{ steps.save.outputs.environment_name }}' repository='${{ steps.save.outputs.repository }}' ScratchOrg=${{ steps.save.outputs.scratch_org_id }} ScratchOrgInfo=${{ steps.save.outputs.scratch_org_info_id }}"